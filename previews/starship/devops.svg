<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300"
     viewBox="0 0 700 300">

  <defs>
    <clipPath id="terminal-clip">
      <rect x="0" y="0" width="700" height="300" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
  </filter>

  <g clip-path="url(#terminal-clip)" filter="url(#shadow)">
    <!-- Background -->
    <rect x="0" y="0" width="700" height="300" fill="dark"/>

    <!-- Title bar -->
    
  <rect x="0" y="0" width="700" height="36" rx="10" ry="10" fill="#313244"/>
  <rect x="0" y="18" width="700" height="18" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Window title -->
  <text x="350" y="23" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', 'Menlo', monospace"
        font-size="13" fill="#6c7086">DevOps Starship</text>

    <!-- Scanline overlay (subtle texture) -->
    <rect x="0" y="36" width="700" height="264"
          fill="url(#scanlines)" opacity="0.03"/>

    <!-- Terminal text -->
    <text font-family="'SF Mono', 'Fira Code', 'Menlo', 'Courier New', monospace"
          font-size="14" letter-spacing="0.3">
      <tspan x="20.0" y="71.28" fill="#a6e3a1" font-weight="bold">❯ </tspan><tspan x="36.8" y="71.28" fill="#cdd6f4">git status</tspan>
      <tspan x="20.0" y="96.48" fill="#cdd6f4" font-weight="normal">On branch </tspan><tspan x="104.0" y="96.48" fill="#89b4fa" font-weight="bold">main</tspan>
      <tspan x="20.0" y="121.68" fill="#f38ba8" font-weight="normal">Changes not staged for commit:</tspan>
      <tspan x="20.0" y="146.88" fill="#6c7086" font-weight="normal">  modified:   </tspan><tspan x="137.6" y="146.88" fill="#a6e3a1" font-weight="normal">src/parser.js</tspan>
      <tspan x="20.0" y="172.07999999999998" fill="#a6e3a1" font-weight="bold">❯ </tspan>
    </text>

    
  <rect x="120.8" y="59.3"
        width="8.4" height="14"
        fill="#cdd6f4" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
    
  <rect x="36.8" y="160.1"
        width="8.4" height="14"
        fill="#cdd6f4" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>

    <text x="680" y="290" text-anchor="end"
             font-family="'SF Mono', 'Fira Code', 'Menlo', monospace"
             font-size="11" fill="#6c7086">starship</text>
    <text x="20" y="290"
             font-family="'SF Mono', 'Fira Code', 'Menlo', monospace"
             font-size="11" fill="#6c7086">devops</text>
  </g>
</svg>