# Minimal Starship Configuration
# Ultra-minimal prompt with only directory and character
# Remove all bloat for maximum speed and simplicity

format = """
$directory$character"""

add_newline = false

[character]
success_symbol = "[❯](6c7a89)"
error_symbol = "[❯](red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "95a5a6"
format = "[$path]($style) "
home_symbol = "~"

