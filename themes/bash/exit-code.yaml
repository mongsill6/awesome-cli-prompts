name: Exit Code
id: exit-code
shell: bash
author: mongsill6
description: Shows last command exit code with color-coded status indicator for debugging
version: 1.0.0
tags:
  - exit-code
  - status
  - debug
  - developer
  - error-handling

requires:
  nerd_font: false
  tools: []

colors:
  primary: "#0087AF"      # Cyan for user/host
  path: "#00D7FF"         # Light cyan for directory
  success: "#87AF00"      # Green for exit code 0
  error: "#D70000"        # Red for non-zero exit codes
  neutral: "#808080"      # Gray for neutral elements

segments:
  - type: user
    format: "%n"
    color: primary

  - type: host
    format: "@%m"
    color: primary

  - type: path
    format: " %~"
    color: path

  - type: exit-code
    format: " [%s]"
    success_color: success
    error_color: error
    show_when: last_command_failed

prompt:
  code: |
    # Exit Code Bash Prompt
    # Captures the exit code of the last executed command

    # Colors
    COLOR_RESET='\033[0m'
    COLOR_CYAN='\033[0;36m'
    COLOR_LIGHT_CYAN='\033[0;36m'
    COLOR_GREEN='\033[0;32m'
    COLOR_RED='\033[0;31m'
    COLOR_GRAY='\033[0;37m'

    # Store exit code before it gets overwritten
    PROMPT_COMMAND='__exit_code=$?'

    # Helper function to format exit code
    __exit_code_prompt() {
        local exit_code=$__exit_code

        if [ $exit_code -eq 0 ]; then
            echo -e "${COLOR_GREEN}✓${COLOR_RESET} ${COLOR_GREEN}0${COLOR_RESET}"
        else
            echo -e "${COLOR_RED}✗${COLOR_RESET} ${COLOR_RED}${exit_code}${COLOR_RESET}"
        fi
    }

    # Main prompt
    export PS1="${COLOR_CYAN}\u@\h${COLOR_RESET}${COLOR_LIGHT_CYAN} \w${COLOR_RESET} \$(__exit_code_prompt)\n${COLOR_CYAN}\$${COLOR_RESET} "

  install_instructions: |
    Installation Instructions:

    1. Add the following to your ~/.bashrc file:

    ```bash
    # Exit Code Prompt
    COLOR_RESET='\033[0m'
    COLOR_CYAN='\033[0;36m'
    COLOR_LIGHT_CYAN='\033[0;36m'
    COLOR_GREEN='\033[0;32m'
    COLOR_RED='\033[0;31m'

    # Capture exit code before it gets overwritten
    PROMPT_COMMAND='__exit_code=$?'

    __exit_code_prompt() {
        local exit_code=$__exit_code

        if [ $exit_code -eq 0 ]; then
            echo -e "${COLOR_GREEN}✓${COLOR_RESET} ${COLOR_GREEN}0${COLOR_RESET}"
        else
            echo -e "${COLOR_RED}✗${COLOR_RESET} ${COLOR_RED}${exit_code}${COLOR_RESET}"
        fi
    }

    export PS1="${COLOR_CYAN}\u@\h${COLOR_RESET}${COLOR_LIGHT_CYAN} \w${COLOR_RESET} \$(__exit_code_prompt)\n${COLOR_CYAN}\$${COLOR_RESET} "
    ```

    2. Reload your shell configuration:
    ```bash
    source ~/.bashrc
    ```

    3. Run commands to see exit codes displayed in your prompt:
    ```bash
    ls                  # Shows green ✓ 0
    false               # Shows red ✗ 1
    exit 127            # Shows red ✗ 127
    ```

examples:
  - description: "Successful command (exit code 0)"
    output: "user@host ~/project ✓ 0\n$ "

  - description: "Failed command (exit code 1)"
    output: "user@host ~/project ✗ 1\n$ "

  - description: "Command not found (exit code 127)"
    output: "user@host ~/project ✗ 127\n$ "

  - description: "Permission denied (exit code 126)"
    output: "user@host ~/project ✗ 126\n$ "

features:
  - Visual indicator: Green checkmark (✓) for success, Red X (✗) for failure
  - Displays numeric exit code for error diagnosis
  - Non-intrusive design that works with other prompt customizations
  - No external dependencies required
  - Works with all bash versions that support PROMPT_COMMAND

tips:
  - Exit codes help you quickly identify why a command failed
  - Common exit codes: 0 (success), 1 (general error), 2 (misuse), 126 (permission denied), 127 (command not found)
  - Combine with git-aware prompt for full development workflow visibility
  - Use in scripts to validate command execution in pipelines

