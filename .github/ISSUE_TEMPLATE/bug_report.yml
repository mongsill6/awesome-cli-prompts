name: Bug Report
description: Report a bug to help us improve
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the bug
      placeholder: What is the bug about?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue
      placeholder: |
        1. First step
        2. Second step
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe what you expected to happen

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened

  - type: dropdown
    id: shell-type
    attributes:
      label: Shell Type
      description: Which shell are you using?
      options:
        - bash
        - zsh
        - fish
        - other

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you running? (output of `node --version`)
      placeholder: v18.0.0

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running on?
      placeholder: macOS 13.0, Ubuntu 22.04, Windows 11, etc.
